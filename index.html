<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AuraSix Creative Dashboard</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#050010;
color:white;
}

/* ===== HERO ===== */

.hero{
padding:60px 20px;
text-align:center;
background:radial-gradient(circle,#ff00ff22,#050010);
}

.hero h1{
font-size:38px;
color:#ff5cff;
margin:0;
}

.hero p{
opacity:0.8;
}

/* ===== SEÇÕES ===== */

.container{
max-width:1100px;
margin:auto;
padding:30px;
}

.section{
background:#0d0222;
padding:25px;
border-radius:14px;
margin-bottom:30px;
}

/* ===== MOODBOARD ===== */

.moodboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:12px;
}

.mood{
height:90px;
border-radius:10px;
animation:pulse 5s infinite alternate;
}

@keyframes pulse{
from{filter:brightness(1);}
to{filter:brightness(1.6);}
}

/* ===== FORM ===== */

select,button{
padding:10px;
margin:8px 5px;
border-radius:8px;
border:none;
}

button{
background:#ff00ff;
color:white;
cursor:pointer;
}

.result{
margin-top:15px;
padding:15px;
background:#12002b;
border-radius:10px;
}

/* ===== 3D ===== */

#preview3d{
height:350px;
border-radius:12px;
margin-top:20px;
}

</style>
</head>

<body>

<div class="hero">
<h1>AuraSix Creative Direction</h1>
<p>Painel de criação de experiências imersivas</p>
</div>

<div class="container">

<!-- MOODBOARD -->
<div class="section">
<h2>Moodboard Conceitual</h2>
<div class="moodboard" id="board"></div>
</div>

<!-- CRIADOR -->
<div class="section">
<h2>Criar Evento</h2>

<select id="tipo">
<option>Festival Imersivo</option>
<option>Evento Premium</option>
<option>Festa Neon</option>
<option>Experiência Sensorial</option>
</select>

<select id="energia">
<option>Cyber Neon</option>
<option>Luxury Futurista</option>
<option>Galáxia Sensorial</option>
<option>Minimal Tech</option>
</select>

<button onclick="criarEvento()">Gerar Conceito</button>

<div id="resultado" class="result">
O conceito do evento aparecerá aqui.
</div>

</div>

<!-- PREVIEW 3D -->
<div class="section">
<h2>Layout do Evento</h2>
<div id="preview3d"></div>
</div>

</div>

<script>

/* ===== MOODBOARD DINÂMICO ===== */

const board=document.getElementById("board");

for(let i=0;i<18;i++){
let block=document.createElement("div");
block.className="mood";
block.style.background=`linear-gradient(45deg,
hsl(${Math.random()*360},100%,60%),
hsl(${Math.random()*360},100%,40%)
)`;
board.appendChild(block);
}

/* ===== GERADOR REAL ===== */

const nomes=[
"AuraPulse","NeonSphere","HyperVision",
"CosmicFlow","NovaExperience"
];

function criarEvento(){

let tipo=document.getElementById("tipo").value;
let energia=document.getElementById("energia").value;

let nome=nomes[Math.floor(Math.random()*nomes.length)];

resultado.innerHTML=`
<h3>${nome}</h3>
<b>Tipo:</b> ${tipo}<br>
<b>Estilo:</b> ${energia}<br><br>

Experiência criada pela direção criativa AuraSix,
com ambientação ${energia.toLowerCase()},
integração sensorial e narrativa visual imersiva.
`;

}

/* ===== PLANTA 3D ===== */

const scene=new THREE.Scene();

const camera=new THREE.PerspectiveCamera(
60,
preview3d.clientWidth/preview3d.clientHeight,
0.1,1000
);

const renderer=new THREE.WebGLRenderer();
renderer.setSize(preview3d.clientWidth,preview3d.clientHeight);
preview3d.appendChild(renderer.domElement);

camera.position.set(0,8,10);
camera.lookAt(0,0,0);

const floor=new THREE.Mesh(
new THREE.PlaneGeometry(14,14),
new THREE.MeshBasicMaterial({color:0x111122})
);

floor.rotation.x=-Math.PI/2;
scene.add(floor);

function area(color,x,z,name){

const mesh=new THREE.Mesh(
new THREE.BoxGeometry(3,0.3,2),
new THREE.MeshBasicMaterial({color})
);

mesh.position.set(x,0.2,z);
scene.add(mesh);
}

area(0xff00ff,0,0,"PISTA");
area(0xff0033,0,-5,"PALCO");
area(0x00ffff,-4,3,"LOUNGE");
area(0x00ffff,4,3,"LOUNGE");
area(0x00ff88,0,6,"ENTRADA");

function animate(){
requestAnimationFrame(animate);
scene.rotation.y+=0.002;
renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
