<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AuraLab Creative Studio</title>

<!-- THREE.JS (3D) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#12002b,#020617);
color:white;
transition:0.6s;
overflow-x:hidden;
}

header{
text-align:center;
padding:20px;
font-size:24px;
border-bottom:2px solid #ff00ff;
letter-spacing:1px;
}

.container{
max-width:1200px;
margin:auto;
padding:25px;
}

h2{
color:#ff7bff;
margin-top:40px;
}

/* SLIDES FUTURISTAS */

.slideshow{
height:320px;
border-radius:14px;
overflow:hidden;
position:relative;
}

.slideshow img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:opacity 1.2s;
}

.slideshow img.active{
opacity:1;
}

/* MOODBOARD */

.moodboard{
display:flex;
flex-wrap:wrap;
gap:12px;
margin-top:20px;
}

.mood{
width:140px;
height:140px;
object-fit:cover;
border-radius:12px;
cursor:grab;
transition:0.3s;
}

.mood:hover{
transform:scale(1.05);
}

/* GERADOR */

.generator{
margin-top:20px;
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:12px;
}

button{
padding:12px 20px;
background:#ff00ff;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

.result{
margin-top:15px;
font-size:17px;
line-height:1.6;
}

/* 3D PREVIEW */

#preview3d{
width:100%;
height:350px;
border-radius:14px;
margin-top:20px;
background:black;
}

.footer{
text-align:center;
margin-top:50px;
opacity:0.6;
}

</style>
</head>

<body>

<header>
🎨 AuraLab | Futuristic Creative Direction
</header>

<div class="container">

<h2>Eventos Imersivos AuraSix</h2>

<div class="slideshow" id="slideshow">

<img src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819" class="active">
<img src="https://images.unsplash.com/photo-1470229722913-7c0e2dbbafd3">
<img src="https://images.unsplash.com/photo-1506157786151-b8491531f063">
<img src="https://images.unsplash.com/photo-1492684223066-81342ee5ff30">
<img src="https://images.unsplash.com/photo-1505236858219-8359eb29e329">

</div>

<h2>Preview 3D do Evento</h2>

<div id="preview3d"></div>

<h2>Moodboard Criativo</h2>

<div class="moodboard" id="board">

<!-- 15+ imagens -->
<img src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819" class="mood" draggable="true">
<img src="https://images.unsplash.com/photo-1506157786151-b8491531f063" class="mood" draggable="true">
<img src="https://images.unsplash.com/photo-1470229722913-7c0e2dbbafd3" class="mood" draggable="true">
<img src="https://images.unsplash.com/photo-1492684223066-81342ee5ff30" class="mood" draggable="true">
<img src="https://images.unsplash.com/photo-1505236858219-8359eb29e329" class="mood" draggable="true">
<img src="https://images.unsplash.com/photo-1503424886307-b090341d25d1" class="mood" draggable="true">
<img src="https://images.unsplash.com/photo-1505373877841-8d25f7d46678" class="mood" draggable="true">
<img src="https://images.unsplash.com/photo-1521335629791-ce4aec67dd47" class="mood" draggable="true">
<img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7" class="mood" draggable="true">
<img src="https://images.unsplash.com/photo-1507874457470-272b3c8d8ee2" class="mood" draggable="true">
<img src="https://images.unsplash.com/photo-1464375117522-1311dd6d0cd2" class="mood" draggable="true">
<img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d" class="mood" draggable="true">
<img src="https://images.unsplash.com/photo-1508609349937-5ec4ae374ebf" class="mood" draggable="true">
<img src="https://images.unsplash.com/photo-1489515217757-5fd1be406fef" class="mood" draggable="true">
<img src="https://images.unsplash.com/photo-1461784121038-f088ca1e7714" class="mood" draggable="true">

</div>

<h2>Gerador de Conceito AuraSix</h2>

<div class="generator">
<button onclick="gerar()">Gerar Conceito Criativo</button>
<div id="resultado" class="result">
Clique para gerar um conceito imersivo.
</div>
</div>

<div class="footer">
AuraSix Experience © Creative Direction
</div>

</div>

<script>

/* SLIDES AUTOMÁTICOS */

let slides=document.querySelectorAll("#slideshow img");
let index=0;

setInterval(()=>{
slides[index].classList.remove("active");
index=(index+1)%slides.length;
slides[index].classList.add("active");
},3000);

/* MOODBOARD DRAG */

let dragged;

document.querySelectorAll(".mood").forEach(img=>{
img.addEventListener("dragstart",()=>dragged=img);
});

document.getElementById("board").addEventListener("dragover",e=>e.preventDefault());

document.getElementById("board").addEventListener("drop",e=>{
e.preventDefault();
if(e.target.classList.contains("mood")){
let temp=e.target.src;
e.target.src=dragged.src;
dragged.src=temp;
}
});

/* GERADOR DE CONCEITO */

const conceitos=[
"Experiência neon imersiva com luzes reativas e narrativa sensorial.",
"Evento futurista com projeções digitais e atmosfera cyber premium.",
"Ambiente multisensorial com cores vibrantes e interação tecnológica.",
"Experiência audiovisual imersiva inspirada em festivais internacionais.",
"Evento AuraSix com identidade visual dinâmica e energia imersiva."
];

function gerar(){
let r=Math.floor(Math.random()*conceitos.length);
document.getElementById("resultado").innerText=conceitos[r];
}

/* PREVIEW 3D */

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,
document.getElementById("preview3d").clientWidth/
document.getElementById("preview3d").clientHeight,
0.1,1000);

const renderer=new THREE.WebGLRenderer();
renderer.setSize(
document.getElementById("preview3d").clientWidth,
document.getElementById("preview3d").clientHeight
);

document.getElementById("preview3d").appendChild(renderer.domElement);

const geometry=new THREE.TorusKnotGeometry(1,0.3,100,16);
const material=new THREE.MeshBasicMaterial({color:0xff00ff,wireframe:true});
const knot=new THREE.Mesh(geometry,material);

scene.add(knot);
camera.position.z=4;

function animate(){
requestAnimationFrame(animate);
knot.rotation.x+=0.01;
knot.rotation.y+=0.01;
renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
