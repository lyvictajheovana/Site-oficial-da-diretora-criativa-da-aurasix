<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AuraSix Creative Direction</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#060012,#020617);
color:white;
}

header{
text-align:center;
padding:22px;
font-size:26px;
color:#ff4dff;
border-bottom:2px solid #ff00ff;
}

.container{
max-width:1200px;
margin:auto;
padding:25px;
}

h2{
color:#ff8cff;
margin-top:45px;
}

/* SLIDES */
.slideshow{
height:340px;
position:relative;
overflow:hidden;
border-radius:14px;
}

.slideshow img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:1.2s;
}

.slideshow img.active{
opacity:1;
}

/* MOODBOARD */
.moodboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
}

.mood{
width:100%;
height:190px;
object-fit:cover;
border-radius:14px;
transition:.3s;
}

.mood:hover{
transform:scale(1.05);
box-shadow:0 0 20px #ff00ff;
}

/* 3D */
#preview3d{
width:100%;
height:380px;
background:black;
border-radius:14px;
margin-top:20px;
}

.generator{
margin-top:20px;
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:12px;
}

button{
background:#ff00ff;
border:none;
padding:12px 22px;
border-radius:8px;
color:white;
cursor:pointer;
font-size:16px;
}

.result{
margin-top:15px;
font-size:18px;
}

</style>
</head>

<body>

<header>
✨ AuraSix Experience — Direção Criativa
</header>

<div class="container">

<h2>Experiências Futuristas Imersivas</h2>

<div class="slideshow" id="slides">

<img src="https://images.unsplash.com/photo-1470229722913-7c0e2dbbafd3" class="active">
<img src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819">
<img src="https://images.unsplash.com/photo-1506157786151-b8491531f063">
<img src="https://images.unsplash.com/photo-1492684223066-81342ee5ff30">
<img src="https://images.unsplash.com/photo-1505236858219-8359eb29e329">

</div>

<h2>Preview 3D do Evento</h2>
<div id="preview3d"></div>

<h2>Moodboard Criativo AuraSix</h2>

<div class="moodboard">

<img class="mood" src="https://images.unsplash.com/photo-1470229722913-7c0e2dbbafd3">
<img class="mood" src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819">
<img class="mood" src="https://images.unsplash.com/photo-1506157786151-b8491531f063">
<img class="mood" src="https://images.unsplash.com/photo-1505236858219-8359eb29e329">
<img class="mood" src="https://images.unsplash.com/photo-1507874457470-272b3c8d8ee2">
<img class="mood" src="https://images.unsplash.com/photo-1464375117522-1311dd6d0cd2">
<img class="mood" src="https://images.unsplash.com/photo-1503424886307-b090341d25d1">
<img class="mood" src="https://images.unsplash.com/photo-1521335629791-ce4aec67dd47">
<img class="mood" src="https://images.unsplash.com/photo-1505373877841-8d25f7d46678">
<img class="mood" src="https://images.unsplash.com/photo-1461784121038-f088ca1e7714">
<img class="mood" src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d">
<img class="mood" src="https://images.unsplash.com/photo-1492724441997-5dc865305da7">

</div>

<h2>Gerador de Conceito AuraSix</h2>

<div class="generator">
<button onclick="gerar()">Gerar Conceito Criativo</button>
<div id="resultado" class="result">
Clique para gerar uma experiência.
</div>
</div>

</div>

<script>

/* SLIDES */
let slides=document.querySelectorAll("#slides img");
let i=0;

setInterval(()=>{
slides[i].classList.remove("active");
i=(i+1)%slides.length;
slides[i].classList.add("active");
},3000);

/* CONCEITOS */
const conceitos=[
"Experiência neon sensorial com interação digital.",
"Evento imersivo cyber-futurista AuraSix.",
"Cenografia audiovisual com narrativa tecnológica.",
"Festival jovem com ambiente multisensorial."
];

function gerar(){
resultado.innerText=conceitos[Math.floor(Math.random()*conceitos.length)];
}

/* ===== 3D ===== */

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(60,preview3d.clientWidth/preview3d.clientHeight,0.1,1000);

const renderer=new THREE.WebGLRenderer();
renderer.setSize(preview3d.clientWidth,preview3d.clientHeight);
preview3d.appendChild(renderer.domElement);

camera.position.set(0,8,10);
camera.lookAt(0,0,0);

const floor=new THREE.Mesh(
new THREE.PlaneGeometry(14,14),
new THREE.MeshBasicMaterial({color:0x111122})
);
floor.rotation.x=-Math.PI/2;
scene.add(floor);

function label(text,x,z){
const canvas=document.createElement("canvas");
const ctx=canvas.getContext("2d");
canvas.width=256;
canvas.height=128;
ctx.fillStyle="white";
ctx.font="28px Arial";
ctx.fillText(text,20,70);

const texture=new THREE.CanvasTexture(canvas);
const sprite=new THREE.Sprite(new THREE.SpriteMaterial({map:texture}));

sprite.scale.set(2,1,1);
sprite.position.set(x,1,z);
scene.add(sprite);
}

const pista=new THREE.Mesh(
new THREE.CircleGeometry(3,32),
new THREE.MeshBasicMaterial({color:0xff00ff})
);
pista.rotation.x=-Math.PI/2;
scene.add(pista);
label("PISTA",0,0);

const palco=new THREE.Mesh(
new THREE.BoxGeometry(4,0.3,2),
new THREE.MeshBasicMaterial({color:0xff0033})
);
palco.position.set(0,0.2,-5);
scene.add(palco);
label("PALCO",0,-5);

[-4,4].forEach(x=>{
let lounge=new THREE.Mesh(
new THREE.BoxGeometry(2,0.2,2),
new THREE.MeshBasicMaterial({color:0x00ffff})
);
lounge.position.set(x,0.1,3);
scene.add(lounge);
label("LOUNGE",x,3);
});

const entrada=new THREE.Mesh(
new THREE.BoxGeometry(2,0.2,1),
new THREE.MeshBasicMaterial({color:0x00ff88})
);
entrada.position.set(0,0.1,6);
scene.add(entrada);
label("ENTRADA",0,6);

function animate(){
requestAnimationFrame(animate);
scene.rotation.y+=0.002;
renderer.render(scene,camera);
}
animate();

</script>

</body>
</html>
