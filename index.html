<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AuraSix Creative Direction</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#0b001f,#020617);
color:white;
}

header{
text-align:center;
padding:20px;
font-size:26px;
color:#ff6bff;
border-bottom:2px solid #ff00ff;
}

.container{
max-width:1200px;
margin:auto;
padding:25px;
}

h2{
color:#ff8cff;
margin-top:40px;
}

/* SLIDES FUTURISTAS */

.slideshow{
height:320px;
overflow:hidden;
border-radius:14px;
position:relative;
}

.slideshow img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:opacity 1.2s;
}

.slideshow img.active{
opacity:1;
}

/* MOODBOARD */

.moodboard{
display:flex;
flex-wrap:wrap;
gap:14px;
}

.mood{
width:150px;
height:150px;
object-fit:cover;
border-radius:14px;
transition:.3s;
}

.mood:hover{
transform:scale(1.05);
}

/* 3D */

#preview3d{
width:100%;
height:380px;
background:black;
border-radius:14px;
margin-top:20px;
}

/* GERADOR */

.generator{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:12px;
margin-top:20px;
}

button{
background:#ff00ff;
border:none;
padding:12px 22px;
border-radius:8px;
color:white;
cursor:pointer;
font-size:15px;
}

.result{
margin-top:15px;
font-size:18px;
}

</style>
</head>

<body>

<header>
✨ AuraSix — Direção Criativa
</header>

<div class="container">

<h2>Eventos Futuristas Imersivos</h2>

<div class="slideshow" id="slides">

<img src="https://picsum.photos/seed/neon1/1200/600" class="active">
<img src="https://picsum.photos/seed/neon2/1200/600">
<img src="https://picsum.photos/seed/neon3/1200/600">
<img src="https://picsum.photos/seed/neon4/1200/600">
<img src="https://picsum.photos/seed/neon5/1200/600">

</div>

<h2>Preview 3D do Evento</h2>
<div id="preview3d"></div>

<h2>Moodboard Criativo AuraSix</h2>

<div class="moodboard">

<img class="mood" src="https://picsum.photos/seed/future1/300/300">
<img class="mood" src="https://picsum.photos/seed/future2/300/300">
<img class="mood" src="https://picsum.photos/seed/future3/300/300">
<img class="mood" src="https://picsum.photos/seed/future4/300/300">
<img class="mood" src="https://picsum.photos/seed/future5/300/300">
<img class="mood" src="https://picsum.photos/seed/future6/300/300">
<img class="mood" src="https://picsum.photos/seed/future7/300/300">
<img class="mood" src="https://picsum.photos/seed/future8/300/300">
<img class="mood" src="https://picsum.photos/seed/future9/300/300">
<img class="mood" src="https://picsum.photos/seed/future10/300/300">
<img class="mood" src="https://picsum.photos/seed/future11/300/300">
<img class="mood" src="https://picsum.photos/seed/future12/300/300">
<img class="mood" src="https://picsum.photos/seed/future13/300/300">
<img class="mood" src="https://picsum.photos/seed/future14/300/300">
<img class="mood" src="https://picsum.photos/seed/future15/300/300">

</div>

<h2>Gerador de Conceito AuraSix</h2>

<div class="generator">
<button onclick="gerar()">Gerar Conceito Criativo</button>
<div id="resultado" class="result">
Clique para gerar uma experiência.
</div>
</div>

</div>

<script>

/* SLIDES AUTOMÁTICOS */
let slides=document.querySelectorAll("#slides img");
let i=0;

setInterval(()=>{
slides[i].classList.remove("active");
i=(i+1)%slides.length;
slides[i].classList.add("active");
},3000);

/* GERADOR */
const conceitos=[
"Experiência sensorial neon com narrativa imersiva.",
"Evento cyber-futurista com cenografia digital interativa.",
"Ambiente audiovisual imersivo com identidade AuraSix.",
"Festival tecnológico com iluminação responsiva."
];

function gerar(){
resultado.innerText=conceitos[Math.floor(Math.random()*conceitos.length)];
}

/* ===== PREVIEW 3D ===== */

const scene=new THREE.Scene();

const camera=new THREE.PerspectiveCamera(
60,
preview3d.clientWidth/preview3d.clientHeight,
0.1,1000
);

const renderer=new THREE.WebGLRenderer();
renderer.setSize(preview3d.clientWidth,preview3d.clientHeight);
preview3d.appendChild(renderer.domElement);

camera.position.set(0,8,10);
camera.lookAt(0,0,0);

const floor=new THREE.Mesh(
new THREE.PlaneGeometry(14,14),
new THREE.MeshBasicMaterial({color:0x111122})
);
floor.rotation.x=-Math.PI/2;
scene.add(floor);

function label(txt,x,z){
const canvas=document.createElement("canvas");
const ctx=canvas.getContext("2d");
canvas.width=256;
canvas.height=128;
ctx.fillStyle="white";
ctx.font="28px Arial";
ctx.fillText(txt,20,70);

const texture=new THREE.CanvasTexture(canvas);
const sprite=new THREE.Sprite(
new THREE.SpriteMaterial({map:texture})
);
sprite.scale.set(2,1,1);
sprite.position.set(x,1,z);
scene.add(sprite);
}

/* pista */
const pista=new THREE.Mesh(
new THREE.CircleGeometry(3,32),
new THREE.MeshBasicMaterial({color:0xff00ff})
);
pista.rotation.x=-Math.PI/2;
scene.add(pista);
label("PISTA",0,0);

/* palco */
const palco=new THREE.Mesh(
new THREE.BoxGeometry(4,0.3,2),
new THREE.MeshBasicMaterial({color:0xff0033})
);
palco.position.set(0,0.2,-5);
scene.add(palco);
label("PALCO",0,-5);

/* lounges */
[-4,4].forEach(x=>{
let lounge=new THREE.Mesh(
new THREE.BoxGeometry(2,0.2,2),
new THREE.MeshBasicMaterial({color:0x00ffff})
);
lounge.position.set(x,0.1,3);
scene.add(lounge);
label("LOUNGE",x,3);
});

/* entrada */
const entrada=new THREE.Mesh(
new THREE.BoxGeometry(2,0.2,1),
new THREE.MeshBasicMaterial({color:0x00ff88})
);
entrada.position.set(0,0.1,6);
scene.add(entrada);
label("ENTRADA",0,6);

function animate(){
requestAnimationFrame(animate);
scene.rotation.y+=0.002;
renderer.render(scene,camera);
}
animate();

</script>

</body>
</html>
