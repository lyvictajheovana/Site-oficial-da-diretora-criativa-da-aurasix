<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AuraSix Creative Lab</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
color:white;
overflow-x:hidden;
background:black;
}

/* FUNDO NEON ANIMADO */

.bg{
position:fixed;
width:100%;
height:100%;
z-index:-1;
background:radial-gradient(circle at 20% 30%, #ff00ff55, transparent 40%),
radial-gradient(circle at 80% 70%, #00ffff55, transparent 40%),
radial-gradient(circle at 50% 50%, #ff006655, transparent 40%);
animation:moveBg 12s infinite alternate;
}

@keyframes moveBg{
0%{filter:hue-rotate(0deg);}
100%{filter:hue-rotate(120deg);}
}

.container{
max-width:1100px;
margin:auto;
padding:30px;
}

h1{
text-align:center;
color:#ff5cff;
}

.creator{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:12px;
}

select,button{
padding:10px;
margin:8px;
border-radius:8px;
border:none;
}

button{
background:#ff00ff;
color:white;
cursor:pointer;
}

.result{
margin-top:20px;
padding:15px;
background:#12002b;
border-radius:10px;
}

/* MOODBOARD DIGITAL */

.moodboard{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
margin-top:25px;
}

.block{
height:80px;
border-radius:8px;
animation:pulse 4s infinite alternate;
}

@keyframes pulse{
from{filter:brightness(1);}
to{filter:brightness(1.6);}
}

/* 3D */
#preview3d{
height:380px;
margin-top:25px;
border-radius:12px;
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

<h1>AuraSix Creative Lab</h1>

<div class="creator">

<select id="vibe">
<option>Cyber Neon</option>
<option>Luxury Futurista</option>
<option>Galáxia Sensorial</option>
<option>Tech Minimal</option>
</select>

<button onclick="criar()">Criar Evento Ao Vivo</button>

<div id="resultado" class="result">
Clique para gerar um conceito.
</div>

</div>

<h2>Moodboard Dinâmico</h2>

<div class="moodboard" id="board"></div>

<h2>Preview do Espaço</h2>
<div id="preview3d"></div>

</div>

<script>

/* MOODBOARD SEM IMAGENS */
const board=document.getElementById("board");

for(let i=0;i<15;i++){
let b=document.createElement("div");
b.className="block";
b.style.background=`hsl(${Math.random()*360},100%,60%)`;
board.appendChild(b);
}

/* GERADOR */
function criar(){
const conceitos=[
"Experiência sensorial neon interativa.",
"Evento audiovisual imersivo AuraSix.",
"Cenografia tecnológica responsiva.",
"Ambiente futurista multissensorial."
];

resultado.innerText=
conceitos[Math.floor(Math.random()*conceitos.length)];
}

/* 3D */

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(
60,
preview3d.clientWidth/preview3d.clientHeight,
0.1,1000
);

const renderer=new THREE.WebGLRenderer();
renderer.setSize(preview3d.clientWidth,preview3d.clientHeight);
preview3d.appendChild(renderer.domElement);

camera.position.set(0,8,10);
camera.lookAt(0,0,0);

const pista=new THREE.Mesh(
new THREE.CircleGeometry(3,32),
new THREE.MeshBasicMaterial({color:0xff00ff})
);

pista.rotation.x=-Math.PI/2;
scene.add(pista);

function animate(){
requestAnimationFrame(animate);
pista.material.color.setHSL(Date.now()*0.0002%1,1,0.5);
renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
